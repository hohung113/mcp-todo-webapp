name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /root/myapp

            # Fix git ownership
            git config --global --add safe.directory /root/myapp

            # Sync code chuẩn 100%
            git fetch origin
            git reset --hard origin/main

            # Build FE
            cd TodoAI_React/TodoAI_React
            docker build --no-cache -t todoai-fe .

            # Build BE
            cd /root/myapp/TodoAI
            docker build --no-cache -t todoai-api .

            # Restart container
            docker stop todoai-fe todoai-api || true
            docker rm todoai-fe todoai-api || true

            # Run FE
            docker run -d \
              -p 80:80 \
              --name todoai-fe \
              todoai-fe

            # Run BE (inject ENV)
            docker run -d \
              -p 5000:5000 \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e ConnectionStrings__Default="${{ secrets.DB_CONNECTION }}" \
              -e Groq__ApiKey="${{ secrets.GROQ_API_KEY }}" \
              --name todoai-api \
              todoai-api

            docker ps